<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5f3ff"/>
      <stop offset="100%" stop-color="#ede9fe"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="1080" cy="120" r="180" fill="#7c3aed" opacity="0.06"/>
  <circle cx="120" cy="520" r="140" fill="#7c3aed" opacity="0.05"/>

  <!-- Logo mark -->
  <rect x="480" y="170" width="80" height="80" rx="22" fill="#7c3aed"/>
  <text x="520" y="228" font-family="Arial, sans-serif" font-size="46" font-weight="800" fill="white" text-anchor="middle">H</text>

  <!-- Site name -->
  <text x="600" y="322" font-family="Arial, sans-serif" font-size="52" font-weight="800" fill="#18181b" text-anchor="middle" letter-spacing="-1">Wingrove Hall</text>

  <!-- Tagline -->
  <text x="600" y="382" font-family="Arial, sans-serif" font-size="26" font-weight="400" fill="#71717a" text-anchor="middle">Check availability and book your event</text>

  <!-- Pill badges -->
  <rect x="340" y="420" width="200" height="44" rx="22" fill="#7c3aed" opacity="0.12"/>
  <text x="440" y="448" font-family="Arial, sans-serif" font-size="18" font-weight="600" fill="#7c3aed" text-anchor="middle">Hire by the hour</text>

  <rect x="560" y="420" width="160" height="44" rx="22" fill="#7c3aed" opacity="0.12"/>
  <text x="640" y="448" font-family="Arial, sans-serif" font-size="18" font-weight="600" fill="#7c3aed" text-anchor="middle">Weekends</text>

  <rect x="740" y="420" width="140" height="44" rx="22" fill="#7c3aed" opacity="0.12"/>
  <text x="810" y="448" font-family="Arial, sans-serif" font-size="18" font-weight="600" fill="#7c3aed" text-anchor="middle">Parties</text>
</svg>
